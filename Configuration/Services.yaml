services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Maispace\MaiEvents\:
    resource: '../Classes/*'

  # Tag all EventProviderInterface implementations for automatic discovery
  Maispace\MaiEvents\EventProvider\EventProviderInterface:
    tags:
      - name: maispace.events.event_provider

  # Inject all tagged event providers as an iterable into the DataProcessor
  Maispace\MaiEvents\DataProcessor\EventsDataProcessor:
    arguments:
      $eventProviders: !tagged_iterator maispace.events.event_provider

  # Inject all tagged event providers as an iterable into the Controller
  Maispace\MaiEvents\Controller\EventsController:
    arguments:
      $eventProviders: !tagged_iterator maispace.events.event_provider
    public: true
