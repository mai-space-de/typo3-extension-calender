services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Maispace\MaiCalendar\:
    resource: '../Classes/*'

  # Tag all EventProviderInterface implementations for automatic discovery
  Maispace\MaiCalendar\EventProvider\EventProviderInterface:
    tags:
      - name: maispace.calendar.event_provider

  # Inject all tagged event providers as an iterable into the DataProcessor
  Maispace\MaiCalendar\DataProcessor\CalendarDataProcessor:
    arguments:
      $eventProviders: !tagged_iterator maispace.calendar.event_provider

  # Inject all tagged event providers as an iterable into the Controller
  Maispace\MaiCalendar\Controller\CalendarController:
    arguments:
      $eventProviders: !tagged_iterator maispace.calendar.event_provider
    public: true

  # MaiProjectEventProvider is disabled by default and can be enabled
  # by projects that have the maispace/project extension installed.
  Maispace\MaiCalendar\EventProvider\MaiProjectEventProvider:
    autoconfigure: false
